<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizune — AI Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Three.js canvas container -->
    <div id="container"></div>

    <!-- Drag hint (fades in on hover) -->
    <div id="drag-hint">drag me ✦</div>

    <!-- Terminal Overlay -->
    <div id="terminal-overlay">
        <div class="terminal-header">
            <span>Mizune Terminal</span>
            <button type="button" class="terminal-close" onclick="toggleTerminal()">✕</button>
        </div>
        <div id="terminal-content"></div>
    </div>

    <!-- Status dot -->
    <div id="status-indicator"></div>

    <!-- Vision indicator -->
    <div id="vision-indicator" class="hidden">
        <span class="vision-dot"></span>
        <span id="vision-text">SCANNING: 0</span>
    </div>

    <!-- Emotion HUD (shows detected emotion in real-time) -->
    <div id="emotion-hud">
        <span id="emotion-hud-emoji">😐</span>
        <span id="emotion-hud-label">neutral</span>
    </div>

    <!-- Settings button (top-left, appears on hover) -->
    <button type="button" id="settings-btn" title="Settings" onclick="openSettings()">⚙</button>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <div id="response-bubble" class="hidden"></div>
        <div id="status"></div>
    </div>

    <!-- Text Chat Input Bar -->
    <div id="chat-bar">
        <input id="chat-input" type="text" placeholder="Type to Mizune..." maxlength="300" />
        <button type="button" id="chat-send" onclick="sendTextMessage()">↑</button>
    </div>

    <!-- Import Map for ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "./node_modules/three/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "./node_modules/three/examples/jsm/loaders/GLTFLoader.js",
            "@pixiv/three-vrm": "./node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
        }
    }
    </script>
    <script type="module" src="renderer.js"></script>
</body>
</html>
