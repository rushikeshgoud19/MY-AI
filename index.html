<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mizune — AI Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Draggable title bar (for frameless window) -->
    <div id="title-bar" data-tauri-drag-region>
        <span id="title-text">Mizune</span>
        <div id="title-controls">
            <button type="button" id="btn-minimize" title="Minimize">─</button>
            <button type="button" id="btn-close" title="Close">✕</button>
        </div>
    </div>

    <!-- Three.js canvas container (full window behind UI) -->
    <div id="container"></div>

    <!-- Status dot -->
    <div id="status-indicator"></div>

    <!-- Emotion HUD (compact) -->
    <div id="emotion-hud">
        <span id="emotion-hud-emoji">😐</span>
    </div>

    <!-- Response bubble (compact speech bubble) -->
    <div id="response-bubble" class="hidden"></div>

    <!-- Chat input (minimal, bottom) -->
    <div id="chat-bar">
        <input id="chat-input" type="text" placeholder="Talk to Mizune..." maxlength="300" />
        <button type="button" id="chat-send" title="Send">↑</button>
    </div>

    <!-- Import Map for ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "./node_modules/three/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "./node_modules/three/examples/jsm/loaders/GLTFLoader.js",
            "@pixiv/three-vrm": "./node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
        }
    }
    </script>
    <script type="module" src="renderer.js"></script>
</body>
</html>
